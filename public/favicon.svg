<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A2E1C"/>
      <stop offset="1" stop-color="#1A6B44"/>
    </linearGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="white" stop-opacity="0.14"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="44" height="44" rx="11" fill="url(#bg)"/>
  <rect width="44" height="22" rx="11" fill="url(#gl)"/>

  <!-- Bar chart -->
  <rect x="6"  y="32" width="4" height="8"  rx="1" fill="white" fill-opacity="0.14"/>
  <rect x="12" y="28" width="4" height="12" rx="1" fill="white" fill-opacity="0.14"/>
  <rect x="18" y="24" width="4" height="16" rx="1" fill="white" fill-opacity="0.14"/>
  <rect x="24" y="27" width="4" height="13" rx="1" fill="white" fill-opacity="0.14"/>
  <rect x="30" y="21" width="4" height="19" rx="1" fill="white" fill-opacity="0.20"/>
  <!-- Trend line -->
  <polyline points="8,32 14,28 20,23 26,26 32,21" stroke="#F0A030" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="32" cy="21" r="2.5" fill="#F0A030"/>
  <!-- ₹ -->
  <text x="22" y="25" text-anchor="middle"
    font-family="'DM Sans','Arial',sans-serif"
    font-size="19" font-weight="800"
    fill="#F0A030">₹</text>
</svg>
