<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Expense Lite AI app workspace for expenses, planner, EMIs, loans, cards, banks, reports, and AI-powered financial lookup.">
<meta name="author" content="Expense Lite AI">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#145A3C">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Expense Lite AI">
<meta property="og:title" content="Expense Lite AI App">
<meta property="og:description" content="Private app workspace for managing expenses, plans, loans, and financial records.">
<meta property="og:url" content="https://expenselyt.com/app">
<meta property="og:image" content="https://expenselyt.com/logo.svg">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Expense Lite AI App">
<meta name="twitter:description" content="Private app workspace for managing expenses, plans, loans, and financial records.">
<link rel="canonical" href="https://expenselyt.com/app">
<title>Expense Lite AI</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body class="app-page">
<div class="app-mobile-topbar">
  <button class="mobile-menu-btn" type="button" aria-label="Open navigation" onclick="toggleSidebar(true)">&#9776;</button>
  <div class="app-mobile-brand">
    <img src="/favicon.svg" alt="Expense Lite AI logo" width="28" height="28">
    <div>
      <div class="app-mobile-title">Expense Lite AI</div>
      <div class="app-mobile-sub">Track &middot; Plan &middot; Ask AI</div>
    </div>
  </div>
</div>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar(false)"></div>
<div class="app" id="app">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="logo">
      <img src="/favicon.svg" alt="Expense Lite AI logo" width="36" height="36" style="flex-shrink:0">
      <div>
        <div class="logo-text" style="line-height:1.1">Expense Lite AI</div>
        <div style="font-size:9px;color:rgba(255,255,255,0.45);letter-spacing:1.2px;font-weight:500;margin-top:1px">TRACK &middot; PLAN &middot; ASK AI</div>
      </div>
    </div>
    <button class="nav-btn active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="icon">&#9673;</span><span>Dashboard</span></button>
    <button class="nav-btn" data-tab="expenses" onclick="switchTab('expenses')"><span class="icon">&#8377;</span><span>Expenses</span></button>
    <button class="nav-btn" data-tab="friends" onclick="switchTab('friends')"><span class="icon">&#8646;</span><span>Friends</span></button>
    <button class="nav-btn" data-tab="divide" onclick="switchTab('divide')"><span class="icon">&#247;</span><span>Split</span></button>
    <button class="nav-btn" data-tab="trips" onclick="switchTab('trips')"><span class="icon">&#9992;</span><span>Trips</span></button>
    <button class="nav-btn" data-tab="reports" onclick="switchTab('reports')"><span class="icon">&#9830;</span><span>Reports</span></button>
    <button class="nav-btn" data-tab="emi" onclick="switchTab('emi')"><span class="icon">%</span><span>EMI Calc</span></button>
    <button class="nav-btn" data-tab="emitracker" onclick="switchTab('emitracker')"><span class="icon">&#9776;</span><span>My EMIs</span></button>
    <button class="nav-btn" data-tab="friendemis" onclick="switchTab('friendemis')"><span class="icon">&#9823;</span><span>Friend EMIs</span></button>
    <button class="nav-btn" data-tab="creditcards" onclick="switchTab('creditcards')"><span class="icon">&#9635;</span><span>Credit Cards</span></button>
    <button class="nav-btn" data-tab="banks" onclick="switchTab('banks')"><span class="icon">&#8859;</span><span>Bank Accounts</span></button>
    <button class="nav-btn" data-tab="planner" onclick="switchTab('planner')"><span class="icon">&#9678;</span><span>Planner</span></button>
    <button class="nav-btn" data-tab="tracker" onclick="switchTab('tracker')"><span class="icon">&#9672;</span><span>Daily Tracker</span></button>
    <button class="nav-btn" data-tab="recurring" onclick="switchTab('recurring')"><span class="icon">&#8635;</span><span>Recurring</span></button>
    <button class="nav-btn" data-tab="ailookup" onclick="switchTab('ailookup')"><span class="icon">&#10022;</span><span>AI Lookup</span></button>
    <button class="nav-btn" id="adminNavBtn" data-tab="admin" onclick="switchTab('admin')" style="display:none"><span class="icon">&#9881;</span><span>Admin</span></button>
    <div style="flex:1"></div>
    <div class="user-box" id="userBox"></div>
    <button class="nav-btn logout-btn" onclick="logout()"><span class="icon">&#9203;</span><span>Logout</span></button>
  </nav>

  <!-- Main content area -->
  <main class="main" id="main"></main>
</div>

<!-- Modal container -->
<div class="overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<script src="/js/utils.js"></script>
<script src="/runtime-config.js"></script>
<script src="/js/mobile-app-banner.js"></script>
<script src="/js/analytics.js"></script>
<script src="/js/pdf.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
