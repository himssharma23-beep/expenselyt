<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Read-only shared data from Expense Lite AI.">
<meta name="author" content="Expense Lite AI">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="theme-color" content="#145A3C">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Expense Lite AI">
<meta property="og:title" content="Shared View - Expense Lite AI">
<meta property="og:description" content="Read-only shared data from Expense Lite AI.">
<meta property="og:url" content="https://expenselyt.com/share">
<meta property="og:image" content="https://expenselyt.com/logo.svg">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Shared View - Expense Lite AI">
<meta name="twitter:description" content="Read-only shared data from Expense Lite AI.">
<title>Shared View - Expense Lite AI</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="/runtime-config.js"></script>
<script src="/js/mobile-app-banner.js"></script>
<script src="/js/analytics.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--em:#145A3C;--em-l:#1D7A52;--em-xl:#E2F5EC;--amber:#F0A030;--red:#C94444;--green:#16A34A;--bg:#F4F5F7;--t1:#1A1D24;--t2:#5F6B7A;--t3:#9CA3B0;--border:#E4E7EC;--white:#FFF;--card:#FFF}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--t1)}
.topbar{background:var(--em);padding:14px 24px;display:flex;align-items:center;gap:14px}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-title{font-size:17px;font-weight:700;color:#fff}
.topbar-sub{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1.2px}
.page{max-width:900px;margin:0 auto;padding:28px 20px}
.page-header{margin-bottom:24px}
.page-header h1{font-size:22px;font-weight:700;color:var(--t1);margin-bottom:4px}
.page-header p{font-size:14px;color:var(--t3)}
.badge-exp{display:inline-block;background:#FEF2F2;color:var(--red);border:1px solid #FECACA;border-radius:6px;font-size:11px;font-weight:600;padding:2px 8px;margin-left:8px}
.friend-card{background:var(--white);border-radius:14px;border:1px solid var(--border);margin-bottom:20px;overflow:hidden}
.friend-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none}
.friend-main{display:flex;align-items:center;gap:10px;min-width:0}
.friend-meta{min-width:0}
.friend-name{font-size:16px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.friend-label{font-size:12px;color:var(--t3);margin-top:4px}
.balance{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace}
.balance.pos{color:var(--green)}
.balance.neg{color:var(--red)}
.balance.zero{color:var(--t3)}
.chevron{font-size:18px;color:var(--t3);transition:transform 0.2s}
.friend-card.open .chevron{transform:rotate(180deg)}
.txn-list{border-top:1px solid var(--border);display:none}
.friend-card.open .txn-list{display:block}
.txn-row{display:grid;grid-template-columns:150px minmax(0,1fr) 120px;gap:14px;padding:12px 20px;border-bottom:1px solid #f0f0f0;font-size:13.5px;align-items:center}
.txn-row:last-child{border-bottom:none}
.txn-date{color:var(--t3);font-size:12.5px;line-height:1.35;word-break:break-word}
.txn-detail{color:var(--t1);line-height:1.45;word-break:break-word}
.txn-amt{text-align:right;font-weight:600;font-family:'JetBrains Mono',monospace;font-size:13px}
.txn-amt.gave{color:var(--red)}
.txn-amt.got{color:var(--green)}
.no-txn{padding:18px 20px;color:var(--t3);font-size:13.5px;text-align:center}
.loading-state{text-align:center;padding:60px 20px;color:var(--t3)}
.error-state{text-align:center;padding:60px 20px}
.error-state h2{color:var(--red);margin-bottom:8px}
.error-state p{color:var(--t3);font-size:14px}
.summary-row{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}
.sum-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 20px;flex:1;min-width:140px}
.sum-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:4px}
.sum-val{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.sum-val.pos{color:var(--green)}
.sum-val.neg{color:var(--red)}
.footer{text-align:center;padding:32px 20px;font-size:12px;color:var(--t3)}
.footer a{color:var(--em);text-decoration:none;font-weight:600}
@media(max-width:600px){.page{padding:20px 14px}.friend-header{padding:14px 16px;align-items:flex-start}.friend-main{align-items:flex-start}.txn-row{grid-template-columns:1fr;gap:6px;padding:12px 16px}.txn-amt{text-align:left}.summary-row{flex-direction:column}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">
    <img src="/favicon.svg" alt="Expense Lite AI logo" width="36" height="36">
    <div>
      <div class="topbar-title">Expense Lite AI</div>
      <div class="topbar-sub">SHARED VIEW - READ ONLY</div>
    </div>
  </div>
</div>
<div class="page">
  <div id="content"><div class="loading-state">Loading shared dataâ€¦</div></div>
</div>
<div class="footer">Shared via <a href="/">Expense Lite AI</a> - Read-only view</div>
<script>
const fmt = n => '\u20B9' + Math.abs(n).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
const token = location.pathname.split('/s/')[1]?.split('/')[0];

function fmtShareDate(value) {
  if (!value) return '-';
  const parsed = new Date(value);
  if (Number.isNaN(parsed.getTime())) return esc(String(value));
  return parsed.toLocaleDateString('en-IN', {
    day: '2-digit',
    month: 'short',
    year: 'numeric',
  });
}

function nameKey(value) {
  return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function computeTripSettlementRows(trip) {
  const members = Array.isArray(trip?.members) ? trip.members : [];
  const expenses = Array.isArray(trip?.expenses) ? trip.expenses : [];
  const rows = members.map((member) => ({
    key: String(member?.id ?? member?.member_key ?? ''),
    fallbackKey: String(member?.member_key ?? ''),
    name: String(member?.member_name || 'Member'),
    share: 0,
    gave: 0,
  }));
  const rowByUiKey = new Map(rows.map((row) => [String(row.key), row]));
  const rowByFallbackKey = new Map(rows.map((row) => [String(row.fallbackKey), row]));
  const rowByName = new Map(rows.map((row) => [nameKey(row.name), row]));

  expenses.forEach((expense) => {
    (expense.splits || []).forEach((split) => {
      const target = rowByUiKey.get(String(split?.member_key || ''))
        || rowByFallbackKey.get(String(split?.member_key || ''))
        || rowByName.get(nameKey(split?.member_name || ''));
      if (target) target.share += Number(split?.share_amount || 0);
    });
    const payer = rowByUiKey.get(String(expense?.paid_by_key || ''))
      || rowByFallbackKey.get(String(expense?.paid_by_key || ''))
      || rowByName.get(nameKey(expense?.paid_by_name || ''));
    if (payer) payer.gave += Number(expense?.amount || 0);
  });

  return rows.map((row) => ({
    ...row,
    share: Math.round(Number(row.share || 0) * 100) / 100,
    gave: Math.round(Number(row.gave || 0) * 100) / 100,
    net: Math.round((Number(row.gave || 0) - Number(row.share || 0)) * 100) / 100,
  }));
}

async function load() {
  try {
    const res = await fetch('/api/public/share/' + token);
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Not found'); }
    const data = await res.json();
    render(data);
  } catch (err) {
    document.getElementById('content').innerHTML = `<div class="error-state"><h2>Link not available</h2><p>${err.message}</p></div>`;
  }
}

function render(data) {
  if (String(data.link_type || '').toLowerCase() === 'trip_detail') {
    renderTrip(data);
    return;
  }
  const friends = data.friends || [];
  const totalOwed = friends.reduce((s,f) => s + (f.balance > 0 ? f.balance : 0), 0);
  const totalOwe  = friends.reduce((s,f) => s + (f.balance < 0 ? Math.abs(f.balance) : 0), 0);
  const filters = data.filters || {};
  let subtitle = '';
  if (filters.year && filters.month) subtitle = `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][filters.month-1]} ${filters.year}`;
  else if (filters.year) subtitle = `Year ${filters.year}`;
  if (data.expires_at) subtitle += (subtitle ? ' - ' : '') + `Expires ${data.expires_at}`;

  let html = `
    <div class="page-header">
      <h1>${esc(data.owner_name || 'Shared')}'s Friends &amp; Loans</h1>
      <p>${subtitle || 'All time - ' + friends.length + ' friend' + (friends.length !== 1 ? 's' : '')}</p>
    </div>
    <div class="summary-row">
      <div class="sum-card"><div class="sum-label">Others owe me</div><div class="sum-val pos">${fmt(totalOwed)}</div></div>
      <div class="sum-card"><div class="sum-label">I owe others</div><div class="sum-val neg">${fmt(totalOwe)}</div></div>
    </div>`;

  if (friends.length === 0) {
    html += '<div class="friend-card"><div class="no-txn">No friends data to display.</div></div>';
  } else {
    friends.forEach((f, i) => {
      const bal = f.balance;
      const balClass = bal > 0.005 ? 'pos' : bal < -0.005 ? 'neg' : 'zero';
      const balText = bal > 0.005 ? `+${fmt(bal)}` : bal < -0.005 ? `-${fmt(Math.abs(bal))}` : '\u20B90.00';
      const balLabel = bal > 0.005 ? 'owes me' : bal < -0.005 ? 'I owe' : 'settled';
      html += `<div class="friend-card" id="fc${i}">
        <div class="friend-header" onclick="toggle(${i})">
          <div class="friend-main"><div class="friend-meta"><div class="friend-name">${esc(f.name)}</div><div class="friend-label">${balLabel}</div></div></div>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="balance ${balClass}">${balText}</span>
            <span class="chevron">^</span>
          </div>
        </div>
        <div class="txn-list">`;
      if (!f.transactions || f.transactions.length === 0) {
        html += `<div class="no-txn">No transactions${filters.year ? ' for this period' : ''}.</div>`;
      } else {
        f.transactions.forEach(t => {
          const gave = t.paid > 0;
          html += `<div class="txn-row">
            <span class="txn-date">${t.txn_date}</span>
            <span class="txn-detail">${esc(t.details)}</span>
            <span class="txn-amt ${gave ? 'gave' : 'got'}">${gave ? '-' : '+'}${fmt(gave ? t.paid : t.received)}</span>
          </div>`;
        });
      }
      html += `</div></div>`;
    });
  }
  document.getElementById('content').innerHTML = html;
}

function renderTrip(data) {
  const trip = data.trip || {};
  const expenses = Array.isArray(trip.expenses) ? trip.expenses : [];
  const members = Array.isArray(trip.members) ? trip.members : [];
  const settlementRows = computeTripSettlementRows(trip);
  const total = Number(trip.grand_total || 0);
  const grouped = {};
  expenses.forEach((expense) => {
    const key = String(expense.expense_type || 'Other');
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(expense);
  });
  const subtitleParts = [];
  if (trip.start_date || trip.end_date) subtitleParts.push(`${fmtShareDate(trip.start_date)}${trip.end_date ? ` to ${fmtShareDate(trip.end_date)}` : ''}`);
  if (data.expires_at) subtitleParts.push(`Expires ${fmtShareDate(data.expires_at)}`);
  let html = `
    <div class="page-header">
      <h1>${esc(data.owner_name || 'Shared')}'s Trip: ${esc(trip.destination || trip.name || 'Trip')}</h1>
      <p>${subtitleParts.join(' - ') || 'Read-only shared trip view'}</p>
    </div>
    <div class="summary-row">
      <div class="sum-card"><div class="sum-label">Status</div><div class="sum-val">${esc(String(trip.status || 'upcoming'))}</div></div>
      <div class="sum-card"><div class="sum-label">Members</div><div class="sum-val">${members.length}</div></div>
      <div class="sum-card"><div class="sum-label">Expenses</div><div class="sum-val">${expenses.length}</div></div>
      <div class="sum-card"><div class="sum-label">Grand Total</div><div class="sum-val pos">${fmt(total)}</div></div>
    </div>
    <div class="friend-card" style="padding:16px 20px">
      <div class="friend-name">${esc(trip.destination || trip.name || 'Trip')}</div>
      <div class="friend-label" style="margin-top:8px">Members: ${esc(members.map((member) => member.member_name || '').filter(Boolean).join(', ') || '-')}</div>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px">
        ${settlementRows.length ? settlementRows.map((row) => `<div style="min-width:110px;padding:8px 10px;border-radius:12px;background:#f8fafc;border:1px solid var(--border)">
          <div style="font-size:12px;font-weight:700;color:var(--t1)">${esc(row.name)}</div>
          <div style="font-size:12px;color:var(--t3);margin-top:3px">Share: <strong style="color:var(--t1)">${fmt(row.share)}</strong></div>
        </div>`).join('') : '<span class="friend-label">No member share totals yet.</span>'}
      </div>
      ${trip.notes ? `<div class="friend-label" style="margin-top:10px;line-height:1.5;color:var(--t2)">${esc(trip.notes)}</div>` : ''}
    </div>`;
  if (!expenses.length) {
    html += '<div class="friend-card"><div class="no-txn">No trip expenses to display.</div></div>';
  } else {
    Object.keys(grouped).forEach((groupName) => {
      const rows = grouped[groupName];
      const subtotal = rows.reduce((sum, row) => sum + Number(row.amount || 0), 0);
      html += `<div class="friend-card open">
        <div class="friend-header" style="cursor:default">
          <div class="friend-main"><div class="friend-meta"><div class="friend-name">${esc(groupName)}</div><div class="friend-label">${rows.length} item${rows.length !== 1 ? 's' : ''}</div></div></div>
          <div class="balance pos">${fmt(subtotal)}</div>
        </div>
        <div class="txn-list" style="display:block">`;
      rows.forEach((row) => {
        const splits = Array.isArray(row.splits) && row.splits.length
          ? row.splits.map((split) => `<strong>${esc(split.member_name)}: ${fmt(split.share_amount)}</strong>`).join(' | ')
          : '';
        html += `<div class="txn-row">
          <span class="txn-date">${fmtShareDate(row.expense_date)}</span>
          <span class="txn-detail">${esc(row.details || '-')}${row.notes ? `<div style="margin-top:4px;color:var(--t3);font-size:12px">${esc(row.notes)}</div>` : ''}${splits ? `<div style="margin-top:4px;color:var(--t3);font-size:12px">Shared: ${splits}</div>` : ''}</span>
          <span class="txn-amt got">${fmt(row.amount || 0)}</span>
        </div>`;
      });
      html += '</div></div>';
    });
  }
  if (settlementRows.length) {
    html += `<div class="friend-card open">
      <div class="friend-header" style="cursor:default">
        <div class="friend-main"><div class="friend-meta"><div class="friend-name">Settlement Summary</div><div class="friend-label">${settlementRows.length} member${settlementRows.length !== 1 ? 's' : ''}</div></div></div>
      </div>
      <div class="txn-list" style="display:block">
        ${settlementRows.map((row) => `<div class="txn-row">
          <span class="txn-date">${esc(row.name)}</span>
          <span class="txn-detail">
            <div>Total Share: <strong>${fmt(row.share)}</strong></div>
            <div style="margin-top:4px;color:var(--t3);font-size:12px">Total Paid: <strong style="color:var(--t1)">${fmt(row.gave)}</strong></div>
          </span>
          <span class="txn-amt ${row.net >= 0 ? 'got' : 'gave'}">${row.net > 0 ? '+' : row.net < 0 ? '-' : ''}${fmt(Math.abs(row.net))}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }
  document.getElementById('content').innerHTML = html;
}

function toggle(i) {
  document.getElementById('fc'+i)?.classList.toggle('open');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

load();
</script>
</body>
</html>
