name: Deploy To Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: ${{ vars.HOSTINGER_APP_DIR || '/var/www/expense-lite-ai' }}
      APP_NAME: ${{ vars.HOSTINGER_APP_NAME || 'expense-lite-ai' }}
      SSH_OPTS: -o BatchMode=yes -o ConnectTimeout=15 -o ServerAliveInterval=30 -o ServerAliveCountMax=3

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Resolve SSH port
        id: ssh_port
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          PORT_VAR: ${{ vars.HOSTINGER_SSH_PORT }}
          PORT_SECRET: ${{ secrets.HOSTINGER_SSH_PORT }}
        run: |
          set -e
          PORT="${PORT_VAR:-}"
          if [ -z "$PORT" ]; then PORT="${PORT_SECRET:-}"; fi
          if [ -n "$PORT" ]; then
            echo "Using configured SSH port: $PORT"
            echo "port=$PORT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "No SSH port configured. Probing common ports (22, 65002)..."
          for p in 22 65002; do
            if timeout 5 bash -lc "cat < /dev/null > /dev/tcp/$HOST/$p" 2>/dev/null; then
              echo "Detected reachable SSH port: $p"
              echo "port=$p" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "Unable to detect SSH port for $HOST. Set HOSTINGER_SSH_PORT in repo Variables or Secrets."
          exit 1

      - name: Add host key
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          PORT: ${{ steps.ssh_port.outputs.port }}
        run: |
          set -e
          if [ -z "$HOST" ]; then echo "ERROR: HOSTINGER_HOST secret is not set."; exit 1; fi
          if [ -z "$PORT" ]; then echo "ERROR: SSH port could not be determined."; exit 1; fi
          echo "Scanning host key for $HOST on port $PORT ..."
          mkdir -p ~/.ssh
          touch ~/.ssh/known_hosts
          ssh-keyscan -T 30 -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>&1 | tee /tmp/keyscan.log
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "ERROR: ssh-keyscan returned no host keys. Host may be unreachable."
            cat /tmp/keyscan.log
            exit 1
          fi
          chmod 600 ~/.ssh/known_hosts
          echo "Host key added successfully."

      - name: SSH connectivity check
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USERNAME: ${{ secrets.HOSTINGER_SSH_USER }}
          PORT: ${{ steps.ssh_port.outputs.port }}
        run: |
          set -e
          echo "Testing SSH to $USERNAME@$HOST:$PORT ..."
          ssh $SSH_OPTS -p "$PORT" "$USERNAME@$HOST" "echo 'SSH OK'"

      - name: Remote runtime check
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USERNAME: ${{ secrets.HOSTINGER_SSH_USER }}
          PORT: ${{ steps.ssh_port.outputs.port }}
        run: |
          set -e
          ssh $SSH_OPTS -p "$PORT" "$USERNAME@$HOST" "
            set -e
            echo 'Remote host:' \$(hostname)
            command -v bash
            command -v rsync
            command -v node
            command -v npm
            command -v pm2
            node -v
            npm -v
            pm2 -v
          "

      - name: Pack release
        run: |
          tar \
            --warning=no-file-changed \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=data \
            --exclude=backups \
            --exclude=.env \
            --exclude=.claude \
            --exclude=*.log \
            -czf release.tgz . || true   

      - name: Upload release
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USERNAME: ${{ secrets.HOSTINGER_SSH_USER }}
          PORT: ${{ steps.ssh_port.outputs.port }}
          SHA: ${{ github.sha }}
        run: |
          ssh $SSH_OPTS -p "$PORT" "$USERNAME@$HOST" "mkdir -p '$APP_DIR/incoming/$SHA'"
          scp $SSH_OPTS -P "$PORT" release.tgz "$USERNAME@$HOST:$APP_DIR/incoming/$SHA/release.tgz"

      - name: Deploy on server
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USERNAME: ${{ secrets.HOSTINGER_SSH_USER }}
          PORT: ${{ steps.ssh_port.outputs.port }}
          SHA: ${{ github.sha }}
        run: |
          ssh $SSH_OPTS -p "$PORT" "$USERNAME@$HOST" "
            set -e
            mkdir -p '$APP_DIR/incoming/$SHA/source'
            tar -xzf '$APP_DIR/incoming/$SHA/release.tgz' -C '$APP_DIR/incoming/$SHA/source'
            cd '$APP_DIR/incoming/$SHA/source'
            chmod +x scripts/deploy-hostinger.sh
            APP_DIR='$APP_DIR' APP_NAME='$APP_NAME' bash scripts/deploy-hostinger.sh '$APP_DIR/incoming/$SHA/source'
            rm -rf '$APP_DIR/incoming/$SHA'
          "
