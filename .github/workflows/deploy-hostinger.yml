name: Deploy To Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: /var/www/expense-lite-ai
      APP_NAME: expense-lite-ai

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Resolve SSH Settings
        id: ssh
        run: |
          HOST="${{ secrets.HOSTINGER_HOST }}"
          USERNAME="${{ secrets.HOSTINGER_SSH_USER }}"
          PORT="22"

          echo "host=$HOST" >> $GITHUB_OUTPUT
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "port=$PORT" >> $GITHUB_OUTPUT

      - name: Debug Connection
        run: |
          echo "Host: ${{ steps.ssh.outputs.host }}"
          echo "User: ${{ steps.ssh.outputs.username }}"
          echo "Port: ${{ steps.ssh.outputs.port }}"

      - name: DNS Lookup
        run: |
          nslookup "${{ steps.ssh.outputs.host }}" || true
          ping -c 4 "${{ steps.ssh.outputs.host }}" || true

      - name: Check Port 22
        run: |
          nc -zv "${{ steps.ssh.outputs.host }}" "${{ steps.ssh.outputs.port }}"

      - name: Add Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p "${{ steps.ssh.outputs.port }}" "${{ steps.ssh.outputs.host }}" >> ~/.ssh/known_hosts

      - name: Test SSH Login
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.username }}@${{ steps.ssh.outputs.host }}" \
            "echo SSH LOGIN SUCCESS"

      - name: Check Remote Environment
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.username }}@${{ steps.ssh.outputs.host }}" \
            "
            hostname
            whoami
            pwd
            node -v
            npm -v
            pm2 -v
            "

      - name: Create Release Archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=.env \
            -czf release.tgz .

      - name: Upload Release
        run: |
          scp \
            -P "${{ steps.ssh.outputs.port }}" \
            release.tgz \
            "${{ steps.ssh.outputs.username }}@${{ steps.ssh.outputs.host }}:/tmp/release.tgz"

      - name: Deploy
        run: |
          ssh \
            -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.username }}@${{ steps.ssh.outputs.host }}" \
            "
            mkdir -p $APP_DIR

            cd $APP_DIR

            tar -xzf /tmp/release.tgz

            npm install

            pm2 restart $APP_NAME || pm2 start npm --name $APP_NAME -- start

            rm -f /tmp/release.tgz
            "