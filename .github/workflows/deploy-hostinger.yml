name: Deploy To Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      APP_DIR: /var/www/expense-lite-ai
      APP_NAME: expense-lite-ai

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Resolve SSH Settings
        id: ssh
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USERNAME: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          echo "host=$HOST" >> $GITHUB_OUTPUT
          echo "username=$USERNAME" >> $GITHUB_OUTPUT
          echo "port=22" >> $GITHUB_OUTPUT

      - name: Debug Connection
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
        run: |
          echo "Host Length: ${#HOST}"
          echo "User: ${{ steps.ssh.outputs.username }}"
          echo "Port: ${{ steps.ssh.outputs.port }}"

      - name: DNS Lookup
        run: |
          echo "Resolving host..."
          nslookup "${{ steps.ssh.outputs.host }}" || true
          ping -c 4 "${{ steps.ssh.outputs.host }}" || true

      - name: Check Port 22
        run: |
          echo "Testing TCP connection..."
          nc -vz "${{ steps.ssh.outputs.host }}" 22

      - name: Add Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H -p 22 "${{ steps.ssh.outputs.host }}" >> ~/.ssh/known_hosts

      - name: Test SSH Login
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -p 22 \
            "${{ steps.ssh.outputs.username }}@${{ steps.ssh.outputs.host }}" \
            "echo SSH LOGIN SUCCESS"

      - name: Check Remote Environment
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -p 22 \
            "${{ steps.ssh.outputs.username }}@${{ steps.ssh.outputs.host }}" \
            "
            echo '===== SERVER INFO ====='
            hostname
            whoami
            pwd

            echo '===== NODE ====='
            node -v || true
            npm -v || true
            pm2 -v || true
            "

      - name: Create Release Archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude=.env \
            --exclude=backups \
            --exclude=data \
            -czf release.tgz .

      - name: Upload Release
        run: |
          scp \
            -P 22 \
            release.tgz \
            "${{ steps.ssh.outputs.username }}@${{ steps.ssh.outputs.host }}:/tmp/release.tgz"

      - name: Deploy
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -p 22 \
            "${{ steps.ssh.outputs.username }}@${{ steps.ssh.outputs.host }}" \
            "
            mkdir -p $APP_DIR
            cd $APP_DIR

            tar -xzf /tmp/release.tgz

            npm install

            pm2 restart $APP_NAME || pm2 start npm --name $APP_NAME -- start

            rm -f /tmp/release.tgz

            echo 'Deployment completed'
            "